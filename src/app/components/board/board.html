<div class="min-h-screen bg-animated-gradient">
  <header class="glass border-t-0 border-x-0 py-4 px-6 flex items-center justify-between">
    <h1 class="text-2xl font-bold text-slate-800">🗒️ RetroFlow</h1>
    <div class="flex items-center gap-4">
      <span class="glass rounded-lg px-3 py-1 text-sm font-mono font-bold text-purple-600">
        Room: {{ roomCode() }}
      </span>
      <span class="text-sm text-slate-500">Logged in as <strong class="text-slate-700">{{ username() }}</strong></span>
      <button
        (click)="onLeave()"
        class="text-sm text-red-500/80 hover:text-red-600 transition-colors"
      >
        Leave
      </button>
    </div>
  </header>

  <main class="p-6">
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
      <app-lane
        title="👍 What Went Well"
        laneType="top"
        [posts]="topPosts()"
        (added)="onAdd($event)"
        (voted)="onVote($event)"
        (deleted)="onDelete($event)"
      />

      <app-lane
        title="💡 Tips & Ideas"
        laneType="tip"
        [posts]="tipPosts()"
        (added)="onAdd($event)"
        (voted)="onVote($event)"
        (deleted)="onDelete($event)"
      />

      <app-lane
        title="⚙️ Process Optimization"
        laneType="process"
        [posts]="processPosts()"
        (added)="onAdd($event)"
        (voted)="onVote($event)"
        (deleted)="onDelete($event)"
      />
    </div>
  </main>
</div>
