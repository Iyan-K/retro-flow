<div class="flex flex-col h-full">
  <div [class]="headerColor + ' text-white text-center py-3 rounded-t-2xl font-bold text-lg backdrop-blur-sm border border-b-0 border-white/10'">
    {{ title() }}
  </div>

  <div class="glass rounded-b-2xl p-4 flex-1 space-y-4 border-t-0">
    <div class="flex gap-2">
      <input
        type="text"
        placeholder="Add a note..."
        [(ngModel)]="newContent"
        (keydown.enter)="onAdd()"
        class="flex-1 px-3 py-2 bg-white/10 border border-white/20 rounded-xl text-sm text-white placeholder-white/40 focus:outline-none focus:ring-2 focus:ring-purple-400/50 transition-all"
      />
      <button
        (click)="onAdd()"
        [disabled]="!newContent.trim()"
        class="bg-purple-500/70 backdrop-blur-sm text-white px-4 py-2 rounded-xl text-sm font-semibold hover:bg-purple-500/90 transition-all disabled:opacity-30 disabled:cursor-not-allowed border border-purple-400/20"
      >
        +
      </button>
    </div>

    @for (post of posts(); track post.id) {
      <app-post-it
        [postIt]="post"
        (voted)="onVote($event)"
        (deleted)="onDelete($event)"
      />
    }

    @if (posts().length === 0) {
      <p class="text-white/30 text-center text-sm italic py-4">No notes yet. Add one above!</p>
    }
  </div>
</div>
