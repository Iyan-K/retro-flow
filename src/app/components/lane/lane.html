<div class="flex flex-col h-full">
  <div [class]="headerColor + ' text-white text-center py-2 rounded-t-lg font-bold text-lg'">
    {{ title() }}
  </div>

  <div class="bg-gray-50 border border-t-0 border-gray-200 rounded-b-lg p-4 flex-1 space-y-4">
    <div class="flex gap-2">
      <input
        type="text"
        placeholder="Add a note..."
        [(ngModel)]="newContent"
        (keydown.enter)="onAdd()"
        class="flex-1 px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300"
      />
      <button
        (click)="onAdd()"
        [disabled]="!newContent.trim()"
        class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-semibold hover:bg-indigo-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
      >
        +
      </button>
    </div>

    @for (post of posts(); track post.id) {
      <app-post-it
        [postIt]="post"
        (voted)="onVote($event)"
        (deleted)="onDelete($event)"
      />
    }

    @if (posts().length === 0) {
      <p class="text-gray-400 text-center text-sm italic py-4">No notes yet. Add one above!</p>
    }
  </div>
</div>
