<div
  class="glass-card rounded-2xl p-4 transition-all duration-300 hover:scale-[1.02] hover:bg-white/15 cursor-default"
>
  <p class="text-white/90 text-sm leading-relaxed mb-3">{{ postIt().content }}</p>

  <div class="flex items-center justify-between text-xs text-white/50">
    <span class="font-medium">✍️ {{ postIt().authorName }}</span>

    <div class="flex items-center gap-2">
      <button
        (click)="onVote()"
        class="flex items-center gap-1 bg-white/10 hover:bg-white/20 rounded-lg px-2 py-1 transition-all text-white/70 hover:text-white border border-white/10"
        title="Upvote"
      >
        👍 <span class="font-semibold">{{ postIt().votes }}</span>
      </button>

      <button
        (click)="onDelete()"
        class="flex items-center bg-red-500/20 hover:bg-red-500/40 rounded-lg px-2 py-1 transition-all text-red-300/80 hover:text-red-200 border border-red-400/10"
        title="Delete"
      >
        🗑️
      </button>
    </div>
  </div>
</div>
