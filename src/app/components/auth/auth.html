<div class="flex items-center justify-center min-h-screen bg-animated-gradient">
  <div class="glass-light rounded-3xl shadow-2xl p-10 max-w-lg w-full text-center">
    <div class="flex items-center justify-center gap-2 mb-2">
      <svg class="w-9 h-9 text-slate-800 shrink-0" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <rect x="4" y="6" width="24" height="24" rx="3" stroke="currentColor" stroke-width="2"/>
        <rect x="10" y="2" width="12" height="7" rx="2" stroke="currentColor" stroke-width="2"/>
        <line x1="9" y1="15" x2="23" y2="15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
        <line x1="9" y1="20" x2="23" y2="20" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
        <line x1="9" y1="25" x2="18" y2="25" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
      </svg>
      <h1 class="text-3xl font-bold text-slate-800">Retro<span class="text-purple-500">Flow</span></h1>
    </div>
    <p class="text-slate-500 mb-8">Doe mee of maak een retrospective bord aan</p>

    <div class="space-y-4">
      <input
        type="text"
        placeholder="Vul je naam in"
        [value]="username()"
        (input)="onUsernameInput($event)"
        maxlength="50"
        class="w-full px-4 py-3 bg-white/50 border border-white/60 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-400/60 text-lg text-slate-800 placeholder-slate-400 transition-all"
      />

      <div class="flex gap-2">
        <input
          type="text"
          placeholder="Kamercode"
          [value]="roomCode()"
          (input)="onRoomCodeInput($event)"
          (keydown.enter)="onJoin()"
          maxlength="10"
          class="flex-1 px-4 py-3 bg-white/50 border border-white/60 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-400/60 text-lg text-slate-800 placeholder-slate-400 uppercase transition-all"
        />

        <button
          (click)="onJoin()"
          [disabled]="!username().trim() || !roomCode().trim()"
          class="bg-purple-500/80 backdrop-blur-sm text-white px-6 py-3 rounded-xl text-lg font-semibold hover:bg-purple-500 transition-all disabled:opacity-30 disabled:cursor-not-allowed border border-purple-400/30"
        >
          Deelnemen
        </button>
      </div>

      <div class="relative">
        <div class="absolute inset-0 flex items-center">
          <div class="w-full border-t border-slate-300/50"></div>
        </div>
        <div class="relative flex justify-center text-sm">
          <span class="glass px-4 py-1 rounded-full text-slate-400 text-xs">of</span>
        </div>
      </div>

      <button
        (click)="onCreateRoom()"
        [disabled]="!username().trim()"
        class="w-full bg-emerald-500/80 backdrop-blur-sm text-white py-3 rounded-xl text-lg font-semibold hover:bg-emerald-500 transition-all disabled:opacity-30 disabled:cursor-not-allowed border border-emerald-400/30"
      >
        Nieuwe kamer aanmaken
      </button>
    </div>
  </div>
</div>
