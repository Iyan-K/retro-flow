<div class="flex items-center justify-center min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100">
  <div class="bg-white rounded-2xl shadow-xl p-10 max-w-md w-full text-center">
    <h1 class="text-3xl font-bold text-gray-800 mb-2">🗒️ RetroFlow</h1>
    <p class="text-gray-500 mb-8">Join or create a retrospective board</p>

    <div class="space-y-4">
      <input
        type="text"
        placeholder="Enter your name"
        [value]="username()"
        (input)="onUsernameInput($event)"
        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-400 text-lg"
      />

      <div class="flex gap-2">
        <input
          type="text"
          placeholder="Room code"
          [value]="roomCode()"
          (input)="onRoomCodeInput($event)"
          (keydown.enter)="onJoin()"
          class="flex-1 px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-400 text-lg uppercase"
        />

        <button
          (click)="onJoin()"
          [disabled]="!username().trim() || !roomCode().trim()"
          class="bg-indigo-600 text-white px-6 py-3 rounded-lg text-lg font-semibold hover:bg-indigo-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
        >
          Join
        </button>
      </div>

      <div class="relative">
        <div class="absolute inset-0 flex items-center">
          <div class="w-full border-t border-gray-200"></div>
        </div>
        <div class="relative flex justify-center text-sm">
          <span class="bg-white px-4 text-gray-400">or</span>
        </div>
      </div>

      <button
        (click)="onCreateRoom()"
        [disabled]="!username().trim()"
        class="w-full bg-green-600 text-white py-3 rounded-lg text-lg font-semibold hover:bg-green-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
      >
        Create New Room
      </button>
    </div>
  </div>
</div>
