<div class="flex items-center justify-center min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100">
  <div class="bg-white rounded-2xl shadow-xl p-10 max-w-md w-full text-center">
    <h1 class="text-3xl font-bold text-gray-800 mb-2">🗒️ RetroFlow</h1>
    <p class="text-gray-500 mb-8">Join the retrospective board</p>

    <div class="space-y-4">
      <input
        type="text"
        placeholder="Enter your name"
        [value]="username()"
        (input)="onUsernameInput($event)"
        (keydown.enter)="onJoin()"
        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-400 text-lg"
      />

      <button
        (click)="onJoin()"
        [disabled]="!username().trim()"
        class="w-full bg-indigo-600 text-white py-3 rounded-lg text-lg font-semibold hover:bg-indigo-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
      >
        Join Board
      </button>
    </div>
  </div>
</div>
