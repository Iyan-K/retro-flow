<div class="flex items-center justify-center min-h-screen bg-animated-gradient">
  <div class="glass-light rounded-3xl shadow-2xl p-10 max-w-md w-full text-center">
    <h1 class="text-3xl font-bold text-white mb-2">🗒️ RetroFlow</h1>
    <p class="text-white/60 mb-8">Join or create a retrospective board</p>

    <div class="space-y-4">
      <input
        type="text"
        placeholder="Enter your name"
        [value]="username()"
        (input)="onUsernameInput($event)"
        class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-400/60 text-lg text-white placeholder-white/40 transition-all"
      />

      <div class="flex gap-2">
        <input
          type="text"
          placeholder="Room code"
          [value]="roomCode()"
          (input)="onRoomCodeInput($event)"
          (keydown.enter)="onJoin()"
          class="flex-1 px-4 py-3 bg-white/10 border border-white/20 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-400/60 text-lg text-white placeholder-white/40 uppercase transition-all"
        />

        <button
          (click)="onJoin()"
          [disabled]="!username().trim() || !roomCode().trim()"
          class="bg-purple-500/80 backdrop-blur-sm text-white px-6 py-3 rounded-xl text-lg font-semibold hover:bg-purple-500 transition-all disabled:opacity-30 disabled:cursor-not-allowed border border-purple-400/30"
        >
          Join
        </button>
      </div>

      <div class="relative">
        <div class="absolute inset-0 flex items-center">
          <div class="w-full border-t border-white/15"></div>
        </div>
        <div class="relative flex justify-center text-sm">
          <span class="glass px-4 py-1 rounded-full text-white/50 text-xs">or</span>
        </div>
      </div>

      <button
        (click)="onCreateRoom()"
        [disabled]="!username().trim()"
        class="w-full bg-emerald-500/80 backdrop-blur-sm text-white py-3 rounded-xl text-lg font-semibold hover:bg-emerald-500 transition-all disabled:opacity-30 disabled:cursor-not-allowed border border-emerald-400/30"
      >
        Create New Room
      </button>
    </div>
  </div>
</div>
