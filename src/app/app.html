<button
  type="button"
  (click)="toggleTheme()"
  class="fixed top-4 right-4 z-50 glass rounded-lg px-3 py-2 text-sm font-semibold text-slate-700 hover:bg-white/60 transition-all"
  [attr.aria-label]="isDarkMode() ? 'Schakel naar lichte modus' : 'Schakel naar donkere modus'"
>
  {{ isDarkMode() ? '☀️ Light mode' : '🌙 Dark mode' }}
</button>

@if (username() && roomCode()) {
  <app-board [username]="username()" [roomCode]="roomCode()" />
} @else {
  <app-auth (joined)="onJoin()" />
}
