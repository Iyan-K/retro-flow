@if (!username() || !roomCode()) {
  <button
    type="button"
    (click)="toggleTheme()"
    class="fixed top-4 right-4 z-50 glass rounded-lg px-3 py-2 text-sm font-semibold text-slate-700 hover:bg-white/60 transition-all"
    [attr.aria-label]="isDarkMode() ? 'Huidige modus donker, schakel naar lichte modus' : 'Huidige modus licht, schakel naar donkere modus'"
  >
    {{ isDarkMode() ? '☀️ Lichte modus' : '🌙 Donkere modus' }}
  </button>
}

@if (username() && roomCode()) {
  <app-board
    [username]="username()"
    [roomCode]="roomCode()"
    [isDarkMode]="isDarkMode()"
    (themeToggled)="toggleTheme()"
  />
} @else {
  <app-auth (joined)="onJoin()" />
}
